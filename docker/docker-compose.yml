
services:
  postgres:
    image: postgres:16-alpine
    container_name: asynctask_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: asynctask
      POSTGRES_PASSWORD: asynctask
      POSTGRES_DB: asynctask_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asynctask -d asynctask_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: asynctask_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: asynctask_api
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ../app:/code/app
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: asynctask_worker
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info
    volumes:
      - ../app:/code/app
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  flower:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: asynctask_flower
    restart: unless-stopped
    command: celery -A app.workers.celery_app flower --port=5555
    ports:
      - "5555:5555"
    env_file:
      - ../.env
    depends_on:
      - worker

volumes:
  postgres_data:
